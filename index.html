<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shader Pilot</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    position: fixed; inset: 0; width: 100%; height: 100%;
    overflow: hidden; background: #05010f; color: #f0e6ff;
    font-family: 'VT323', monospace; -webkit-font-smoothing: antialiased;
    overscroll-behavior: none; touch-action: none;
  }
  button { font-family: inherit; cursor: pointer; }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0, rgba(0,0,0,0.18) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: multiply;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 51;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
  }

  /* === AUTH === */
  .auth-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,0,128,0.25), transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(0,200,255,0.25), transparent 50%),
      linear-gradient(180deg, #0a0420 0%, #05010f 100%);
  }
  .auth-stars {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(2px 2px at 80% 20%, #fff, transparent),
      radial-gradient(1px 1px at 40% 90%, #fff, transparent),
      radial-gradient(1px 1px at 90% 50%, #ff80c0, transparent),
      radial-gradient(2px 2px at 10% 70%, #80c0ff, transparent),
      radial-gradient(1px 1px at 50% 40%, #fff, transparent);
    background-size: 200px 200px;
    animation: twinkle 4s steps(2) infinite; opacity: 0.8;
  }
  @keyframes twinkle { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

  .auth-card {
    position: relative; z-index: 2; width: 100%; max-width: 380px;
    background: rgba(10, 4, 30, 0.85);
    border: 2px solid #ff3380; border-radius: 4px; padding: 28px 22px;
    box-shadow: 0 0 0 1px rgba(255,51,128,0.4), 0 0 30px rgba(255,51,128,0.4), inset 0 0 30px rgba(255,51,128,0.1);
  }
  .auth-title {
    font-family: 'Press Start 2P', monospace; font-size: 1.1rem;
    text-align: center; margin-bottom: 6px; color: #ffeb80;
    text-shadow: 2px 2px 0 #ff3380, 4px 4px 0 #6020c0;
    letter-spacing: 2px; line-height: 1.5;
  }
  .auth-sub { text-align: center; color: #80c0ff; font-size: 1.1rem; margin-bottom: 22px; letter-spacing: 2px; text-transform: uppercase; }
  .auth-tabs { display: flex; gap: 4px; margin-bottom: 18px; padding: 3px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
  .auth-tab { flex: 1; border: 0; background: transparent; color: #80a0c0; padding: 8px; font-family: 'VT323', monospace; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; transition: all 0.15s; }
  .auth-tab.active { background: #ff3380; color: #fff; box-shadow: 0 0 10px rgba(255,51,128,0.6); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.95rem; color: #ffeb80; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .field input { width: 100%; background: rgba(0,0,0,0.6); border: 1px solid #6020c0; color: #f0e6ff; padding: 10px 12px; font-family: 'VT323', monospace; font-size: 1.2rem; letter-spacing: 1px; border-radius: 0; outline: none; transition: all 0.15s; }
  .field input:focus { border-color: #ff3380; box-shadow: 0 0 12px rgba(255,51,128,0.5); }
  .auth-btn { width: 100%; border: 0; background: linear-gradient(180deg, #ff3380, #c01060); color: #fff; padding: 14px; font-family: 'Press Start 2P', monospace; font-size: 0.85rem; letter-spacing: 2px; border-radius: 0; box-shadow: 0 4px 0 #6010a0, 0 0 20px rgba(255,51,128,0.5); transition: all 0.1s; margin-top: 6px; }
  .auth-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #6010a0, 0 0 12px rgba(255,51,128,0.5); }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-msg { text-align: center; margin-top: 14px; font-size: 1rem; min-height: 22px; letter-spacing: 1px; }
  .auth-msg.error { color: #ff80a0; } .auth-msg.success { color: #80ffc0; }

  /* === GAME === */
  .game-screen { position: fixed; inset: 0; z-index: 1; display: none; }
  .game-screen.active { display: block; }
  #gameCanvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }

  .hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  .hud-corner { position: absolute; padding: 8px 12px; background: rgba(5, 1, 15, 0.55); border: 1px solid rgba(255,51,128,0.35); color: #ffeb80; font-family: 'Press Start 2P', monospace; font-size: 0.6rem; letter-spacing: 1.5px; backdrop-filter: blur(4px); }
  .hud-tl { top: 12px; left: 12px; min-width: 130px; }
  .hud-tr { top: 12px; right: 12px; text-align: right; min-width: 130px; }
  .hud-label { color: #80c0ff; font-size: 0.5rem; margin-bottom: 3px; letter-spacing: 2px; }
  .hud-value { font-size: 0.75rem; }
  .hud-row { display: flex; justify-content: space-between; gap: 8px; }
  .hud-row + .hud-row { margin-top: 4px; }

  /* HP bar */
  .hp-bar { width: 110px; height: 6px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,80,80,0.5); margin-top: 4px; }
  .hp-fill { height: 100%; background: linear-gradient(90deg, #ff3340, #ffeb80); transition: width 0.2s; }

  /* Top center buttons */
  .top-buttons { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; pointer-events: auto; }
  .top-btn { background: rgba(5, 1, 15, 0.55); border: 1px solid rgba(128, 192, 255, 0.35); color: #80c0ff; padding: 7px 12px; font-family: 'VT323', monospace; font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase; backdrop-filter: blur(4px); position: relative; }
  .top-btn:active { background: rgba(128, 192, 255, 0.2); }
  .top-btn .badge { position: absolute; top: -6px; right: -6px; background: #ff3380; color: #fff; font-size: 0.65rem; padding: 2px 5px; min-width: 16px; text-align: center; }

  /* Joystick */
  .touch-stick {
    position: absolute; bottom: 30px; left: 30px;
    width: 110px; height: 110px;
    border: 2px solid rgba(255, 51, 128, 0.4);
    border-radius: 50%; background: rgba(5, 1, 15, 0.4);
    pointer-events: auto; backdrop-filter: blur(4px);
    touch-action: none;
  }
  .touch-stick-knob {
    position: absolute; top: 50%; left: 50%;
    width: 50px; height: 50px; margin: -25px 0 0 -25px;
    background: radial-gradient(circle, #ff3380, #c01060);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255,51,128,0.6);
    pointer-events: none; transition: transform 0.05s;
  }

  /* Action buttons (right side) */
  .action-stack { position: absolute; bottom: 30px; right: 25px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .action-btn {
    width: 75px; height: 75px; border-radius: 50%;
    pointer-events: auto; touch-action: none;
    font-family: 'Press Start 2P', monospace; font-size: 0.55rem; letter-spacing: 2px;
    color: #80c0ff; backdrop-filter: blur(4px);
  }
  .boost-btn { border: 2px solid rgba(128, 192, 255, 0.5); background: radial-gradient(circle, rgba(128, 192, 255, 0.3), rgba(64, 96, 200, 0.15)); }
  .boost-btn.active { background: radial-gradient(circle, rgba(255,235,128,0.5), rgba(255,51,128,0.3)); border-color: #ffeb80; color: #fff; box-shadow: 0 0 25px rgba(255,235,128,0.7); }
  .fire-btn { border: 2px solid rgba(255, 80, 80, 0.6); background: radial-gradient(circle, rgba(255,80,80,0.3), rgba(180,40,60,0.15)); color: #ff80a0; }
  .fire-btn.active { background: radial-gradient(circle, rgba(255,80,80,0.6), rgba(255,235,128,0.3)); border-color: #ff3340; color: #fff; box-shadow: 0 0 25px rgba(255,80,80,0.8); }

  /* === MENUS (Hangar/Shop/Invites/Game over) === */
  .menu-overlay {
    position: fixed; inset: 0; z-index: 80;
    display: none; align-items: center; justify-content: center; padding: 18px;
    background: rgba(5, 1, 15, 0.88); backdrop-filter: blur(6px);
  }
  .menu-overlay.active { display: flex; }
  .menu-card {
    width: 100%; max-width: 460px; max-height: 92vh; overflow-y: auto;
    background: rgba(10, 4, 30, 0.95); border: 2px solid #6020c0;
    box-shadow: 0 0 0 1px rgba(96,32,192,0.4), 0 0 30px rgba(96,32,192,0.5);
    padding: 22px 18px;
  }
  .menu-title {
    font-family: 'Press Start 2P', monospace; font-size: 0.95rem; color: #ffeb80;
    text-align: center; letter-spacing: 2px; margin-bottom: 6px;
    text-shadow: 2px 2px 0 #ff3380;
  }
  .menu-sub { text-align: center; color: #80c0ff; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }
  .menu-tabs { display: flex; gap: 4px; margin-bottom: 14px; padding: 3px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
  .menu-tab { flex: 1; border: 0; background: transparent; color: #80a0c0; padding: 8px 4px; font-family: 'VT323', monospace; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }
  .menu-tab.active { background: #6020c0; color: #fff; }
  .ship-card, .upgrade-card, .invite-card {
    background: rgba(0,0,0,0.55); border: 1px solid rgba(255,51,128,0.35);
    padding: 12px; margin-bottom: 10px;
  }
  .ship-card.active-ship { border-color: #ffeb80; box-shadow: 0 0 12px rgba(255,235,128,0.4); }
  .ship-name { font-family: 'Press Start 2P', monospace; font-size: 0.7rem; color: #ffeb80; letter-spacing: 2px; margin-bottom: 6px; }
  .ship-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 1rem; color: #80c0ff; margin-bottom: 8px; }
  .ship-stat-val { color: #f0e6ff; }
  .ship-actions { display: flex; gap: 6px; }
  .menu-btn {
    flex: 1; border: 0; padding: 10px;
    font-family: 'VT323', monospace; font-size: 1rem; letter-spacing: 2px;
    text-transform: uppercase; color: #fff;
  }
  .menu-btn.primary { background: linear-gradient(180deg, #ff3380, #c01060); box-shadow: 0 3px 0 #6010a0; }
  .menu-btn.secondary { background: rgba(96,32,192,0.6); border: 1px solid #80c0ff; color: #80c0ff; }
  .menu-btn.success { background: linear-gradient(180deg, #40c080, #208050); box-shadow: 0 3px 0 #105030; }
  .menu-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .menu-btn:active { transform: translateY(1px); }
  .close-btn {
    width: 100%; padding: 12px; margin-top: 8px;
    background: transparent; border: 1px solid rgba(128,192,255,0.4);
    color: #80c0ff; font-family: 'VT323', monospace; font-size: 1.1rem; letter-spacing: 3px;
    text-transform: uppercase;
  }
  .empty-state { text-align: center; color: #80a0c0; padding: 24px 12px; font-size: 1.05rem; letter-spacing: 1px; }

  /* Invite */
  .pilot-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(128,192,255,0.25); margin-bottom: 6px; }
  .pilot-info { flex: 1; }
  .pilot-name { font-family: 'Press Start 2P', monospace; font-size: 0.7rem; color: #ffeb80; letter-spacing: 1px; }
  .pilot-meta { font-size: 0.95rem; color: #80c0ff; margin-top: 2px; }
  .invite-btn { padding: 6px 12px; background: linear-gradient(180deg, #40c0ff, #2080c0); border: 0; color: #fff; font-family: 'VT323', monospace; font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase; }
  .invite-btn:disabled { opacity: 0.5; }
  .invite-msg-from { font-size: 0.95rem; color: #80c0ff; margin-top: 4px; font-style: italic; }

  /* Game over */
  .gameover-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0; }
  .gameover-stat { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,51,128,0.3); padding: 10px; text-align: center; }
  .gameover-stat-label { font-size: 0.85rem; color: #80c0ff; letter-spacing: 2px; text-transform: uppercase; }
  .gameover-stat-val { font-family: 'Press Start 2P', monospace; font-size: 1rem; color: #ffeb80; margin-top: 4px; }

  /* Loading */
  .loading { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; background: #05010f; font-family: 'Press Start 2P', monospace; color: #ffeb80; font-size: 0.9rem; letter-spacing: 3px; }
  .loading.hidden { display: none; }
  .loading-text::after { content: '...'; animation: dots 1s steps(4) infinite; }
  @keyframes dots { 0%{content:'';} 25%{content:'.';} 50%{content:'..';} 75%{content:'...';} }

  /* Toast */
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); z-index: 150; background: rgba(10,4,30,0.95); border: 1px solid #ffeb80; color: #ffeb80; padding: 10px 18px; font-family: 'VT323', monospace; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .auth-title { font-size: 0.9rem; }
    .hud-corner { font-size: 0.55rem; padding: 6px 9px; min-width: 110px; }
    .hud-value { font-size: 0.65rem; }
    .action-btn { width: 65px; height: 65px; font-size: 0.5rem; }
    .touch-stick { width: 95px; height: 95px; bottom: 24px; left: 22px; }
    .touch-stick-knob { width: 42px; height: 42px; margin: -21px 0 0 -21px; }
    .action-stack { bottom: 24px; right: 18px; gap: 10px; }
    .top-btn { padding: 6px 9px; font-size: 0.85rem; }
    .menu-card { padding: 16px 12px; }
  }
</style>
</head>
<body>

<div class="loading" id="loadingScreen"><div class="loading-text">INITIALIZING</div></div>
<div class="toast" id="toast"></div>

<!-- AUTH -->
<div class="auth-screen" id="authScreen">
  <div class="auth-stars"></div>
  <div class="auth-card">
    <div class="auth-title">SHADER<br>PILOT</div>
    <div class="auth-sub">// galaxy fighter //</div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="signin" type="button">Sign In</button>
      <button class="auth-tab" data-tab="signup" type="button">Sign Up</button>
    </div>
    <form id="authForm">
      <div class="field" id="callsignField" style="display:none;">
        <label>Callsign</label>
        <input type="text" id="callsignInput" maxlength="20" autocomplete="off">
      </div>
      <div class="field"><label>Email</label><input type="email" id="emailInput" required autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="passwordInput" required minlength="6" autocomplete="current-password"></div>
      <button class="auth-btn" type="submit" id="authSubmit">ENGAGE</button>
    </form>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- GAME -->
<div class="game-screen" id="gameScreen">
  <canvas id="gameCanvas"></canvas>
  <div class="hud">
    <div class="hud-corner hud-tl">
      <div class="hud-row"><span class="hud-label">PILOT</span><span class="hud-value" id="hudCallsign">---</span></div>
      <div class="hud-row"><span class="hud-label">SHIP</span><span class="hud-value" id="hudShip">STRIKER</span></div>
      <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    </div>
    <div class="hud-corner hud-tr">
      <div class="hud-row"><span class="hud-label">DIST</span><span class="hud-value" id="hudDist">0</span></div>
      <div class="hud-row"><span class="hud-label">KILLS</span><span class="hud-value" id="hudKills">0</span></div>
      <div class="hud-row"><span class="hud-label">CR</span><span class="hud-value" id="hudCredits">0</span></div>
    </div>
    <div class="top-buttons">
      <button class="top-btn" id="hangarBtn" type="button">Hangar</button>
      <button class="top-btn" id="invitesBtn" type="button">Invites<span class="badge" id="inviteBadge" style="display:none">0</span></button>
      <button class="top-btn" id="signoutBtn" type="button">Exit</button>
    </div>
    <div class="touch-stick" id="touchStick"><div class="touch-stick-knob" id="stickKnob"></div></div>
    <div class="action-stack">
      <button class="action-btn fire-btn" id="fireBtn" type="button">FIRE</button>
      <button class="action-btn boost-btn" id="boostBtn" type="button">BOOST</button>
    </div>
  </div>
</div>

<!-- HANGAR / SHOP / UPGRADE -->
<div class="menu-overlay" id="hangarMenu">
  <div class="menu-card">
    <div class="menu-title">HANGAR</div>
    <div class="menu-sub">// fleet management //</div>
    <div class="menu-tabs">
      <button class="menu-tab active" data-htab="fleet" type="button">Fleet</button>
      <button class="menu-tab" data-htab="shop" type="button">Shop</button>
      <button class="menu-tab" data-htab="upgrade" type="button">Upgrade</button>
    </div>
    <div id="hangarContent"></div>
    <button class="close-btn" id="hangarClose" type="button">Close</button>
  </div>
</div>

<!-- INVITES -->
<div class="menu-overlay" id="invitesMenu">
  <div class="menu-card">
    <div class="menu-title">INVITES</div>
    <div class="menu-sub">// recruit pilots //</div>
    <div class="menu-tabs">
      <button class="menu-tab active" data-itab="incoming" type="button">Incoming</button>
      <button class="menu-tab" data-itab="send" type="button">Send</button>
    </div>
    <div id="invitesContent"></div>
    <button class="close-btn" id="invitesClose" type="button">Close</button>
  </div>
</div>

<!-- GAME OVER -->
<div class="menu-overlay" id="gameoverMenu">
  <div class="menu-card">
    <div class="menu-title" style="color:#ff80a0;text-shadow:2px 2px 0 #c01060;">SHIP DESTROYED</div>
    <div class="menu-sub">// run complete //</div>
    <div class="gameover-stats">
      <div class="gameover-stat"><div class="gameover-stat-label">Distance</div><div class="gameover-stat-val" id="goDist">0</div></div>
      <div class="gameover-stat"><div class="gameover-stat-label">Kills</div><div class="gameover-stat-val" id="goKills">0</div></div>
      <div class="gameover-stat"><div class="gameover-stat-label">Credits</div><div class="gameover-stat-val" id="goCredits">0</div></div>
      <div class="gameover-stat"><div class="gameover-stat-label">Best</div><div class="gameover-stat-val" id="goBest">0</div></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="menu-btn primary" id="goRestart" type="button">Relaunch</button>
      <button class="menu-btn secondary" id="goHangar" type="button">Hangar</button>
    </div>
  </div>
</div>

<script type="module">

const INVITES_TABLE = 'uNMexs7BYTXQ2_shader_pilot_invites';

// === SHIP CATALOG ===

const UPGRADE_DEFS = {

const els = {
  loading: document.getElementById('loadingScreen'),

  game: document.getElementById('gameScreen'),

let mode = 'signin';
let currentUser = null;
let currentPilot = null;
let game = null;

let toastTimer = null;

function toast(msg, ms = 1800) {
  els.toast.textContent = msg;
  els.toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => els.toast.classList.remove('show'), ms);
}

// === AUTH ===
els.authTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    els.authTabs.forEach(t => t.classList.toggle('active', t === tab));
    mode = tab.dataset.tab;
    els.callsignField.style.display = mode === 'signup' ? 'block' : 'none';
    els.authSubmit.textContent = mode === 'signup' ? 'LAUNCH' : 'ENGAGE';
    els.authMsg.textContent = ''; els.authMsg.className = 'auth-msg';
  });
});

els.authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  els.authSubmit.disabled = true;
  els.authMsg.className = 'auth-msg';
  els.authMsg.textContent = mode === 'signup' ? 'CREATING PILOT...' : 'AUTHENTICATING...';
  try {
    const email = els.email.value.trim();
    const password = els.password.value;
    if (mode === 'signup') {
      const callsign = els.callsign.value.trim();
      if (!callsign) throw new Error('Callsign required');
      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { emailRedirectTo: 'https://sling-gogiapp.web.app/email-confirmed.html' }
      });
      if (error) throw error;
      if (data.user) {
        await supabase.from(PILOTS_TABLE).insert({
          callsign, email, best_score: 0, best_distance: 0, runs_completed: 0,
          credits: 500, kills: 0, active_ship: 'striker',
          owned_ships: ['striker'], upgrades: {}
        });
      }
      els.authMsg.className = 'auth-msg success';
      els.authMsg.textContent = 'PILOT REGISTERED. CHECK EMAIL.';
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      els.authMsg.className = 'auth-msg success';
      els.authMsg.textContent = 'LAUNCHING...';
    }
  } catch (err) {
    els.authMsg.className = 'auth-msg error';
    els.authMsg.textContent = (err.message || 'AUTH FAILED').toUpperCase();
  } finally {
    els.authSubmit.disabled = false;
  }
});

els.signout.addEventListener('click', async () => {
  if (game) { game.stop(); game = null; }
  await supabase.auth.signOut();
});

supabase.auth.onAuthStateChange(async (event, session) => {
  els.loading.classList.add('hidden');
  if (session && session.user) {
    currentUser = session.user;
    await loadPilot();
    await checkInvites();
    showGame();
  } else {
    currentUser = null; currentPilot = null; showAuth();
  }
});

async function loadPilot() {
  try {
    const { data } = await supabase.from(PILOTS_TABLE).select('*').limit(1);
    if (data && data.length) {
      currentPilot = data[0];
      // Backfill defaults
      if (!currentPilot.owned_ships) currentPilot.owned_ships = ['striker'];
      if (!currentPilot.upgrades) currentPilot.upgrades = {};
      if (!currentPilot.active_ship) currentPilot.active_ship = 'striker';
      if (currentPilot.credits == null) currentPilot.credits = 500;
      if (currentPilot.kills == null) currentPilot.kills = 0;
      if (!currentPilot.email) currentPilot.email = currentUser.email;
    } else {
      const cs = (currentUser.email || 'PILOT').split('@')[0].toUpperCase().slice(0, 12);
      const { data: ins } = await supabase.from(PILOTS_TABLE)
        .insert({ callsign: cs, email: currentUser.email, best_score: 0, best_distance: 0, runs_completed: 0,
                  credits: 500, kills: 0, active_ship: 'striker', owned_ships: ['striker'], upgrades: {} })
        .select().single();
      currentPilot = ins;
    }
  } catch (e) {
    console.error('Pilot load error:', e.message);
    currentPilot = { callsign: 'PILOT', best_distance: 0, credits: 500, kills: 0, active_ship: 'striker', owned_ships: ['striker'], upgrades: {} };
  }
}

async function savePilotPartial(patch) {
  if (!currentPilot?.id) return;
  Object.assign(currentPilot, patch);
  try { await supabase.from(PILOTS_TABLE).update(patch).eq('id', currentPilot.id); }
  catch (e) { console.error('Save error:', e.message); }
}

async function checkInvites() {
  try {
    const { data } = await supabase.from(INVITES_TABLE).select('*').eq('status', 'pending');
    const count = (data || []).length;
    if (count > 0) {
      els.inviteBadge.textContent = count;
      els.inviteBadge.style.display = 'inline-block';
    } else {
      els.inviteBadge.style.display = 'none';
    }
  } catch {}
}

function showAuth() { els.game.classList.remove('active'); els.auth.style.display = 'flex'; }
function showGame() {
  els.auth.style.display = 'none';
  els.game.classList.add('active');
  updateHud();
  if (!game) { try { game = new ShaderPilotGame(); game.start(); } catch (e) { console.error('Game init error:', e.message, e.stack); } }
  else { game.respawn(); }
}

function updateHud() {
  els.hudCallsign.textContent = (currentPilot?.callsign || 'PILOT').toUpperCase();
  els.hudShip.textContent = SHIPS[currentPilot?.active_ship || 'striker'].name;
  els.hudCredits.textContent = currentPilot?.credits || 0;
  els.hudKills.textContent = currentPilot?.kills || 0;
}

// === HANGAR MENU ===
function getShipStats(shipKey) {
  const base = SHIPS[shipKey];
  const u = currentPilot.upgrades?.[shipKey] || {};
  const speed = base.speed * (1 + (u.speed || 0) * 0.10);
  const hp = base.hp + (u.hp || 0) * 25;
  const fireRate = base.fireRate * Math.pow(0.85, u.fireRate || 0);
  const damage = 1 + (u.damage || 0) * 0.25;
  return { speed, hp, fireRate, damage };
}

els.hangarBtn.addEventListener('click', () => openHangar('fleet'));
els.hangarClose.addEventListener('click', () => els.hangarMenu.classList.remove('active'));
els.hangarTabs.forEach(t => t.addEventListener('click', () => {
  els.hangarTabs.forEach(x => x.classList.toggle('active', x === t));
  hangarTab = t.dataset.htab;
  renderHangar();
}));

function openHangar(tab) {
  hangarTab = tab || 'fleet';
  els.hangarTabs.forEach(t => t.classList.toggle('active', t.dataset.htab === hangarTab));
  renderHangar();
  els.hangarMenu.classList.add('active');
}

function renderHangar() {
  if (hangarTab === 'fleet') renderFleet();
  else if (hangarTab === 'shop') renderShop();
  else renderUpgrade();
}

function renderFleet() {
  const owned = currentPilot.owned_ships || ['striker'];
  let html = '';
  owned.forEach(key => {
    const s = SHIPS[key]; if (!s) return;
    const st = getShipStats(key);
    const isActive = currentPilot.active_ship === key;
    html += `<div class="ship-card ${isActive ? 'active-ship' : ''}">
      <div class="ship-name">${s.name} ${isActive ? '◆ ACTIVE' : ''}</div>
      <div style="font-size:0.95rem;color:#80a0c0;margin-bottom:6px;">${s.desc}</div>
      <div class="ship-stats">
        <div>SPD <span class="ship-stat-val">${st.speed.toFixed(0)}</span></div>
        <div>HP <span class="ship-stat-val">${st.hp.toFixed(0)}</span></div>
        <div>RoF <span class="ship-stat-val">${(1/st.fireRate).toFixed(1)}/s</span></div>
        <div>DMG <span class="ship-stat-val">${(st.damage*100).toFixed(0)}%</span></div>
      </div>
      ${!isActive ? `<button class="menu-btn primary" data-equip="${key}" type="button">Equip</button>` : ''}
    </div>`;
  });
  els.hangarContent.innerHTML = html || '<div class="empty-state">No ships owned</div>';
  els.hangarContent.querySelectorAll('[data-equip]').forEach(b => {
    b.addEventListener('click', async () => {
      await savePilotPartial({ active_ship: b.dataset.equip });
      updateHud();
      if (game) game.rebuildShip();
      renderFleet();
      toast('Ship equipped');
    });
  });
}

function renderShop() {
  const owned = currentPilot.owned_ships || ['striker'];
  let html = `<div style="text-align:center;color:#ffeb80;font-size:1.2rem;margin-bottom:10px;">CREDITS: ${currentPilot.credits}</div>`;
  Object.keys(SHIPS).forEach(key => {
    const s = SHIPS[key];
    const isOwned = owned.includes(key);
    html += `<div class="ship-card">
      <div class="ship-name">${s.name}</div>
      <div style="font-size:0.95rem;color:#80a0c0;margin-bottom:6px;">${s.desc}</div>
      <div class="ship-stats">
        <div>SPD <span class="ship-stat-val">${s.speed}</span></div>
        <div>HP <span class="ship-stat-val">${s.hp}</span></div>
        <div>RoF <span class="ship-stat-val">${(1/s.fireRate).toFixed(1)}/s</span></div>
        <div>PRICE <span class="ship-stat-val" style="color:#ffeb80;">${s.price} CR</span></div>
      </div>
      ${isOwned ? `<button class="menu-btn secondary" disabled type="button">Owned</button>`
                 : `<button class="menu-btn ${currentPilot.credits >= s.price ? 'success' : ''}" data-buy="${key}" ${currentPilot.credits < s.price ? 'disabled' : ''} type="button">${currentPilot.credits >= s.price ? 'Purchase' : 'Insufficient'}</button>`}
    </div>`;
  });
  els.hangarContent.innerHTML = html;
  els.hangarContent.querySelectorAll('[data-buy]').forEach(b => {
    b.addEventListener('click', async () => {
      const key = b.dataset.buy; const s = SHIPS[key];
      if (currentPilot.credits < s.price) return;
      const newOwned = [...(currentPilot.owned_ships || []), key];
      await savePilotPartial({ owned_ships: newOwned, credits: currentPilot.credits - s.price });
      updateHud(); renderShop();
      toast(`${s.name} acquired!`);
    });
  });
}

function renderUpgrade() {
  const shipKey = currentPilot.active_ship;
  const s = SHIPS[shipKey];
  const upgrades = currentPilot.upgrades?.[shipKey] || {};
  let html = `<div style="text-align:center;color:#ffeb80;font-size:1.1rem;margin-bottom:6px;">UPGRADING: ${s.name}</div>
              <div style="text-align:center;color:#80c0ff;font-size:1rem;margin-bottom:14px;">CREDITS: ${currentPilot.credits}</div>`;
  Object.keys(UPGRADE_DEFS).forEach(key => {
    const def = UPGRADE_DEFS[key];
    const lvl = upgrades[key] || 0;
    const cost = def.baseCost * Math.pow(2, lvl);
    const maxed = lvl >= def.max;
    html += `<div class="upgrade-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <div class="ship-name" style="margin:0;">${def.name} L${lvl}/${def.max}</div>
        <div style="color:#ffeb80;font-size:1rem;">${maxed ? 'MAX' : cost + ' CR'}</div>
      </div>
      <div style="font-size:0.95rem;color:#80a0c0;margin-bottom:8px;">${def.desc}</div>
      <button class="menu-btn ${!maxed && currentPilot.credits >= cost ? 'success' : 'secondary'}" data-up="${key}" ${maxed || currentPilot.credits < cost ? 'disabled' : ''} type="button">${maxed ? 'Maxed' : (currentPilot.credits >= cost ? 'Upgrade' : 'Need Credits')}</button>
    </div>`;
  });
  els.hangarContent.innerHTML = html;
  els.hangarContent.querySelectorAll('[data-up]').forEach(b => {
    b.addEventListener('click', async () => {
      const key = b.dataset.up;
      const lvl = upgrades[key] || 0;
      const cost = UPGRADE_DEFS[key].baseCost * Math.pow(2, lvl);
      if (currentPilot.credits < cost || lvl >= UPGRADE_DEFS[key].max) return;
      const newUpgrades = { ...currentPilot.upgrades };
      newUpgrades[shipKey] = { ...(newUpgrades[shipKey] || {}), [key]: lvl + 1 };
      await savePilotPartial({ upgrades: newUpgrades, credits: currentPilot.credits - cost });
      if (game) game.applyShipStats();
      updateHud(); renderUpgrade();
      toast(`${UPGRADE_DEFS[key].name} L${lvl+1}!`);
    });
  });
}

async function renderInvites() {
  if (inviteTab === 'incoming') {
    try {
      const { data } = await supabase.from(INVITES_TABLE).select('*').eq('status', 'pending').order('created_at', { ascending: false });
      if (!data || !data.length) { els.invitesContent.innerHTML = '<div class="empty-state">No incoming invites</div>'; return; }
      let html = '';
      data.forEach(inv => {
        html += `<div class="invite-card">
          <div class="pilot-name">${(inv.from_callsign || 'PILOT').toUpperCase()}</div>
          <div class="pilot-meta">Wants to fly with you</div>
          ${inv.message ? `<div class="invite-msg-from">"${inv.message}"</div>` : ''}
          <div style="display:flex;gap:6px;margin-top:8px;">
            <button class="menu-btn success" data-accept="${inv.id}" type="button">Accept</button>
            <button class="menu-btn secondary" data-decline="${inv.id}" type="button">Decline</button>
          </div>
        </div>`;
      });
      els.invitesContent.innerHTML = html;
      els.invitesContent.querySelectorAll('[data-accept]').forEach(b => b.addEventListener('click', async () => {
        await supabase.from(INVITES_TABLE).update({ status: 'accepted' }).eq('id', b.dataset.accept);
        // Reward both pilots with credits
        await savePilotPartial({ credits: currentPilot.credits + 200 });
        updateHud(); checkInvites(); renderInvites();
        toast('Invite accepted! +200 CR');
      }));
      els.invitesContent.querySelectorAll('[data-decline]').forEach(b => b.addEventListener('click', async () => {
        await supabase.from(INVITES_TABLE).update({ status: 'declined' }).eq('id', b.dataset.decline);
        checkInvites(); renderInvites();
      }));
    } catch (e) { els.invitesContent.innerHTML = '<div class="empty-state">Error loading invites</div>'; }
  } else {
    // Send tab — list other pilots
    els.invitesContent.innerHTML = `
      <div style="margin-bottom:10px;">
        <input id="inviteSearch" type="text" placeholder="Search callsign..." style="width:100%;padding:10px;background:rgba(0,0,0,0.6);border:1px solid #6020c0;color:#f0e6ff;font-family:'VT323',monospace;font-size:1.1rem;letter-spacing:1px;outline:none;">
      </div>
      <div id="pilotList"><div class="empty-state">Loading pilots...</div></div>`;
    const search = document.getElementById('inviteSearch');
    const list = document.getElementById('pilotList');
    const fetchPilots = async (q = '') => {
      try {
        let query = supabase.from(PILOTS_TABLE).select('id, user_id, callsign, best_distance, kills, active_ship');
        if (q) query = query.ilike('callsign', `%${q}%`);
        const { data } = await query.limit(30);
        const others = (data || []).filter(p => p.user_id !== currentUser.id);
        if (!others.length) { list.innerHTML = '<div class="empty-state">No pilots found</div>'; return; }
        let html = '';
        others.forEach(p => {
          html += `<div class="pilot-row">
            <div class="pilot-info">
              <div class="pilot-name">${(p.callsign || 'PILOT').toUpperCase()}</div>
              <div class="pilot-meta">${SHIPS[p.active_ship || 'striker']?.name || 'STRIKER'} • ${Math.floor(p.best_distance||0)} dist • ${p.kills||0} kills</div>
            </div>
            <button class="invite-btn" data-invite="${p.user_id}" data-cs="${p.callsign}" type="button">Invite</button>
          </div>`;
        });
        list.innerHTML = html;
        list.querySelectorAll('[data-invite]').forEach(b => b.addEventListener('click', async () => {
          b.disabled = true; b.textContent = 'Sent';
          try {
            await supabase.from(INVITES_TABLE).insert({
              from_user_id: currentUser.id,
              from_callsign: currentPilot.callsign,
              to_user_id: b.dataset.invite,
              to_callsign: b.dataset.cs,
              message: 'Join the squadron!',
              status: 'pending'
            });
            toast('Invite sent!');
          } catch (e) { b.disabled = false; b.textContent = 'Retry'; toast('Send failed'); }
        }));
      } catch (e) { list.innerHTML = '<div class="empty-state">Error loading pilots</div>'; }
    };
    fetchPilots();
    let searchTimer;
    search.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => fetchPilots(search.value.trim()), 300);
    });
  }
}

class ShaderPilotGame {
  constructor() {
    this.canvas = els.canvas;
    this.scene = new THREE.Scene();
    this.scene.fog = new THREE.FogExp2(0x05010f, 0.012);
    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 800);
    this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, antialias: false, alpha: false });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setClearColor(0x05010f);

    this.input = { x: 0, y: 0, boost: false, fire: false };
    this.keys = {};
    this.shipPos = new THREE.Vector3(0, 0, 0);
    this.shipVel = new THREE.Vector3(0, 0, 0);
    this.shipRot = { pitch: 0, yaw: 0, roll: 0 };
    this.distance = 0;
    this.runKills = 0;
    this.runCredits = 0;
    this.lastFire = 0;
    this.running = false;
    this.lastSave = 0;
    this.dead = false;

    this.lasers = [];
    this.enemyLasers = [];
    this.enemies = [];
    this.explosions = [];

    this.applyShipStats();
    this.buildWorld();
    this.bindControls();

    window.addEventListener('resize', () => this.onResize());
  }

  applyShipStats() {
    const stats = getShipStats(currentPilot.active_ship);
    this.shipStats = stats;
    this.maxHp = stats.hp;
    if (this.hp == null) this.hp = stats.hp;
  }

  rebuildShip() {
    if (this.ship) this.scene.remove(this.ship);
    this.applyShipStats();
    this.hp = this.maxHp;
    this.buildShip();
    this.updateHpBar();
  }

  buildWorld() {
    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1500;
    const sp = new Float32Array(starCount * 3);
    const sc = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
      const r = 300 + Math.random() * 200;
      const t = Math.random() * Math.PI * 2;
      const p = Math.acos(2 * Math.random() - 1);
      sp[i*3] = r*Math.sin(p)*Math.cos(t); sp[i*3+1] = r*Math.sin(p)*Math.sin(t); sp[i*3+2] = r*Math.cos(p);
      const v = Math.random();
      if (v < 0.5) { sc[i*3]=1; sc[i*3+1]=1; sc[i*3+2]=1; }
      else if (v < 0.75) { sc[i*3]=1; sc[i*3+1]=0.5; sc[i*3+2]=0.8; }
      else { sc[i*3]=0.5; sc[i*3+1]=0.8; sc[i*3+2]=1; }
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(sp, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(sc, 3));
    this.stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ size: 1.4, vertexColors: true, sizeAttenuation: false, transparent: true, opacity: 0.9 }));
    this.scene.add(this.stars);

    // Nebulae
    const nc = [0xff3380, 0x6020c0, 0x2080ff, 0xff8040];
    this.nebulae = [];
    for (let i = 0; i < 14; i++) {
      const m = new THREE.Mesh(new THREE.SphereGeometry(40 + Math.random()*30, 8, 6),
        new THREE.MeshBasicMaterial({ color: nc[i%nc.length], transparent: true, opacity: 0.06, side: THREE.BackSide, depthWrite: false }));
      m.position.set((Math.random()-0.5)*200, (Math.random()-0.5)*100, -i*80 - Math.random()*100);
      this.scene.add(m); this.nebulae.push(m);
    }

    // Asteroid obstacles
    this.obstacles = [];
    const obsGeoms = [
      new THREE.IcosahedronGeometry(2, 0),
      new THREE.OctahedronGeometry(2.5, 0),
      new THREE.TetrahedronGeometry(2.8, 0),
      new THREE.DodecahedronGeometry(2.2, 0),
    ];
    for (let i = 0; i < 50; i++) {
      const geo = obsGeoms[i % obsGeoms.length];
      const hue = (i * 25) % 360;
      const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(`hsl(${hue}, 80%, 60%)`), wireframe: true, transparent: true, opacity: 0.85 });
      const m = new THREE.Mesh(geo, mat);
      const ang = Math.random() * Math.PI * 2;
      const rad = 8 + Math.random() * 18;
      m.position.set(Math.cos(ang)*rad, Math.sin(ang)*rad, -30 - i*25 - Math.random()*15);
      m.userData.spin = { x:(Math.random()-0.5)*0.02, y:(Math.random()-0.5)*0.02, z:(Math.random()-0.5)*0.02 };
      this.scene.add(m); this.obstacles.push(m);
    }

    // Tunnel rings
    this.rings = [];
    for (let i = 0; i < 40; i++) {
      const r = new THREE.Mesh(new THREE.TorusGeometry(14, 0.18, 6, 32),
        new THREE.MeshBasicMaterial({ color: i%3===0?0xff3380:(i%3===1?0x80c0ff:0xffeb80), transparent: true, opacity: 0.5 }));
      r.position.z = -i * 30; this.scene.add(r); this.rings.push(r);
    }

    // Grids
    this.grid = new THREE.Mesh(new THREE.PlaneGeometry(400, 2000, 40, 200),
      new THREE.MeshBasicMaterial({ color: 0xff3380, wireframe: true, transparent: true, opacity: 0.18 }));
    this.grid.rotation.x = -Math.PI/2; this.grid.position.y = -25; this.grid.position.z = -500;
    this.scene.add(this.grid);
    this.gridTop = new THREE.Mesh(new THREE.PlaneGeometry(400, 2000, 40, 200),
      new THREE.MeshBasicMaterial({ color: 0x80c0ff, wireframe: true, transparent: true, opacity: 0.15 }));
    this.gridTop.rotation.x = Math.PI/2; this.gridTop.position.y = 25; this.gridTop.position.z = -500;
    this.scene.add(this.gridTop);

    this.buildShip();

    // Spawn initial enemy wave
    for (let i = 0; i < 4; i++) this.spawnEnemy(-80 - i * 40);
  }

  buildShip() {
    const def = SHIPS[currentPilot.active_ship];
    const ship = new THREE.Group();
    const bodyGeo = new THREE.ConeGeometry(0.45, 1.6, 4);
    bodyGeo.rotateX(Math.PI / 2);
    ship.add(new THREE.Mesh(bodyGeo, new THREE.MeshBasicMaterial({ color: def.color })));
    const wireMat = new THREE.MeshBasicMaterial({ color: def.accent, wireframe: true });
    const wb = new THREE.Mesh(bodyGeo, wireMat); wb.scale.setScalar(1.02); ship.add(wb);
    const wingGeo = new THREE.BoxGeometry(1.6, 0.08, 0.5);
    const wing = new THREE.Mesh(wingGeo, new THREE.MeshBasicMaterial({ color: def.accent }));
    wing.position.z = 0.2; ship.add(wing);
    const ww = new THREE.Mesh(wingGeo, wireMat); ww.position.z = 0.2; ww.scale.setScalar(1.05); ship.add(ww);
    const glow = new THREE.Mesh(new THREE.SphereGeometry(0.25, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xffeb80, transparent: true, opacity: 0.85 }));
    glow.position.z = 0.85; ship.add(glow); this.engineGlow = glow;
    this.ship = ship; this.scene.add(ship);
  }

  spawnEnemy(zPos) {
    const enemy = new THREE.Group();
    // Octahedron body — alien fighter
    const bodyGeo = new THREE.OctahedronGeometry(0.9, 0);
    const body = new THREE.Mesh(bodyGeo, new THREE.MeshBasicMaterial({ color: 0xff4040 }));
    enemy.add(body);
    const wire = new THREE.Mesh(bodyGeo, new THREE.MeshBasicMaterial({ color: 0xffeb80, wireframe: true }));
    wire.scale.setScalar(1.05); enemy.add(wire);
    // Wing tips
    const tipGeo = new THREE.ConeGeometry(0.2, 0.5, 4);
    const tipMat = new THREE.MeshBasicMaterial({ color: 0xff8080 });
    const lTip = new THREE.Mesh(tipGeo, tipMat); lTip.position.x = -0.9; lTip.rotation.z = Math.PI/2; enemy.add(lTip);
    const rTip = new THREE.Mesh(tipGeo, tipMat); rTip.position.x = 0.9; rTip.rotation.z = -Math.PI/2; enemy.add(rTip);
    // Eye glow
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xffeb80 }));
    eye.position.z = -0.6; enemy.add(eye);

    enemy.position.set((Math.random()-0.5)*16, (Math.random()-0.5)*14, zPos);
    enemy.userData = {
      hp: 2,
      lastFire: performance.now() + Math.random() * 2000,
      strafePhase: Math.random() * Math.PI * 2,
      strafeSpeed: 0.5 + Math.random() * 0.5,
    };
    this.scene.add(enemy); this.enemies.push(enemy);
  }

  fireLaser() {
    const geo = new THREE.CylinderGeometry(0.08, 0.08, 1.4, 6);
    geo.rotateX(Math.PI / 2);
    const mat = new THREE.MeshBasicMaterial({ color: 0x80ff80, transparent: true, opacity: 0.95 });
    // Two lasers (left/right wing)
    [-0.7, 0.7].forEach(xo => {
      const l = new THREE.Mesh(geo, mat);
      l.position.set(this.shipPos.x + xo, this.shipPos.y, -3);
      l.userData = { speed: 120, life: 1.5 };
      this.scene.add(l); this.lasers.push(l);
    });
  }

  enemyFireLaser(enemy) {
    const geo = new THREE.CylinderGeometry(0.1, 0.1, 1.6, 6);
    geo.rotateX(Math.PI / 2);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff4040, transparent: true, opacity: 0.95 });
    const l = new THREE.Mesh(geo, mat);
    l.position.copy(enemy.position);
    // Aim at ship
    const dx = this.shipPos.x - enemy.position.x;
    const dy = this.shipPos.y - enemy.position.y;
    const dz = -3 - enemy.position.z;
    const len = Math.hypot(dx, dy, dz);
    l.userData = { vx: (dx/len)*60, vy: (dy/len)*60, vz: (dz/len)*60, life: 2.5 };
    this.scene.add(l); this.enemyLasers.push(l);
  }

  spawnExplosion(x, y, z, color = 0xffeb80) {
    const count = 10;
    for (let i = 0; i < count; i++) {
      const p = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.25, 0.25),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 }));
      p.position.set(x, y, z);
      const ang = Math.random() * Math.PI * 2;
      const speed = 5 + Math.random() * 8;
      p.userData = {
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        vz: (Math.random() - 0.5) * 6,
        life: 0.6 + Math.random() * 0.3,
      };
      this.scene.add(p); this.explosions.push(p);
    }
  }

  takeDamage(dmg) {
    if (this.dead) return;
    this.hp -= dmg;
    this.updateHpBar();
    if (this.hp <= 0) {
      this.hp = 0;
      this.die();
    }
  }

  die() {
    this.dead = true;
    this.spawnExplosion(this.shipPos.x, this.shipPos.y, -3, 0xff4040);
    this.spawnExplosion(this.shipPos.x, this.shipPos.y, -3, 0xffeb80);
    if (this.ship) this.ship.visible = false;
    setTimeout(() => this.endRun(), 800);
  }

  async endRun() {
    const newCredits = (currentPilot.credits || 0) + this.runCredits;
    const newKills = (currentPilot.kills || 0) + this.runKills;
    const isBest = this.distance > (currentPilot.best_distance || 0);
    const patch = { credits: newCredits, kills: newKills, runs_completed: (currentPilot.runs_completed||0) + 1 };
    if (isBest) patch.best_distance = this.distance;
    await savePilotPartial(patch);
    updateHud();
    els.goDist.textContent = Math.floor(this.distance);
    els.goKills.textContent = this.runKills;
    els.goCredits.textContent = '+' + this.runCredits;
    els.goBest.textContent = Math.floor(currentPilot.best_distance || 0);
    els.gameoverMenu.classList.add('active');
  }

  respawn() {
    this.dead = false;
    this.distance = 0;
    this.runKills = 0;
    this.runCredits = 0;
    this.applyShipStats();
    this.hp = this.maxHp;
    this.shipPos.set(0, 0, 0);
    this.shipVel.set(0, 0, 0);
    if (this.ship) this.ship.visible = true;
    else this.buildShip();
    // Clear all projectiles + enemies
    [...this.lasers, ...this.enemyLasers, ...this.enemies, ...this.explosions].forEach(o => this.scene.remove(o));
    this.lasers = []; this.enemyLasers = []; this.enemies = []; this.explosions = [];
    for (let i = 0; i < 4; i++) this.spawnEnemy(-80 - i * 40);
    this.updateHpBar();
    updateHud();
  }

  updateHpBar() {
    const pct = Math.max(0, (this.hp / this.maxHp) * 100);
    els.hpFill.style.width = pct + '%';
  }

  bindControls() {
    // Keyboard
    window.addEventListener('keydown', (e) => {
      this.keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') e.preventDefault();
    });
    window.addEventListener('keyup', (e) => { this.keys[e.key.toLowerCase()] = false; });

    // === Joystick — uses its OWN touch identifier ===
    let stickTouchId = null;
    let baseRect = null;

    const stickStart = (e) => {
      // Pick first touch that started on the stick
      const t = e.changedTouches ? e.changedTouches[0] : e;
      if (stickTouchId !== null) return; // already tracking
      stickTouchId = e.changedTouches ? t.identifier : 'mouse';
      baseRect = els.stick.getBoundingClientRect();
      e.preventDefault();
      this.updateStickFromTouch(t);
    };
    const stickMove = (e) => {
      if (stickTouchId === null) return;
      if (e.changedTouches) {
        for (const tc of e.changedTouches) {
          if (tc.identifier === stickTouchId) { e.preventDefault(); this.updateStickFromTouch(tc); return; }
        }
      } else if (stickTouchId === 'mouse') {
        e.preventDefault();
        this.updateStickFromTouch(e);
      }
    };
    const stickEnd = (e) => {
      if (stickTouchId === null) return;
      if (e.changedTouches) {
        for (const tc of e.changedTouches) {
          if (tc.identifier === stickTouchId) { stickTouchId = null; this.resetStick(); return; }
        }
      } else { stickTouchId = null; this.resetStick(); }
    };

    this._stickBaseRect = () => baseRect;

    els.stick.addEventListener('touchstart', stickStart, { passive: false });
    els.stick.addEventListener('touchmove', stickMove, { passive: false });
    els.stick.addEventListener('touchend', stickEnd);
    els.stick.addEventListener('touchcancel', stickEnd);
    els.stick.addEventListener('mousedown', stickStart);
    window.addEventListener('mousemove', (e) => { if (stickTouchId === 'mouse') stickMove(e); });
    window.addEventListener('mouseup', (e) => { if (stickTouchId === 'mouse') stickEnd(e); });

    // === Boost button — fully isolated from joystick ===
    const boostOn = (e) => {
      e.preventDefault(); e.stopPropagation();
      this.input.boost = true; els.boost.classList.add('active');
    };
    const boostOff = (e) => {
      e.preventDefault(); e.stopPropagation();
      this.input.boost = false; els.boost.classList.remove('active');
    };
    els.boost.addEventListener('touchstart', boostOn, { passive: false });
    els.boost.addEventListener('touchend', boostOff);
    els.boost.addEventListener('touchcancel', boostOff);
    els.boost.addEventListener('mousedown', boostOn);
    els.boost.addEventListener('mouseup', boostOff);
    els.boost.addEventListener('mouseleave', boostOff);

    // === Fire button — also isolated ===
    const fireOn = (e) => {
      e.preventDefault(); e.stopPropagation();
      this.input.fire = true; els.fire.classList.add('active');
    };
    const fireOff = (e) => {
      e.preventDefault(); e.stopPropagation();
      this.input.fire = false; els.fire.classList.remove('active');
    };
    els.fire.addEventListener('touchstart', fireOn, { passive: false });
    els.fire.addEventListener('touchend', fireOff);
    els.fire.addEventListener('touchcancel', fireOff);
    els.fire.addEventListener('mousedown', fireOn);
    els.fire.addEventListener('mouseup', fireOff);
    els.fire.addEventListener('mouseleave', fireOff);
  }

  updateStickFromTouch(t) {
    const rect = this._stickBaseRect();
    if (!rect) return;
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = t.clientX - cx;
    let dy = t.clientY - cy;
    const max = rect.width / 2 - 10;
    const len = Math.hypot(dx, dy);
    if (len > max) { dx = dx/len*max; dy = dy/len*max; }
    els.knob.style.transform = `translate(${dx}px, ${dy}px)`;
    this.input.x = dx / max;
    this.input.y = dy / max;
  }
  resetStick() {
    els.knob.style.transform = 'translate(0, 0)';
    this.input.x = 0; this.input.y = 0;
  }

  onResize() {
    this.camera.aspect = window.innerWidth / window.innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(window.innerWidth, window.innerHeight);
  }

  start() { this.running = true; this.lastTime = performance.now(); this.loop(); }
  stop() { this.running = false; if (this.rafId) cancelAnimationFrame(this.rafId); }

  loop = () => {
    if (!this.running) return;
    try {
      const now = performance.now();
      const dt = Math.min(0.05, (now - this.lastTime) / 1000);
      this.lastTime = now;
      this.update(dt);
      this.renderer.render(this.scene, this.camera);
    } catch (e) {
      console.error('Loop error:', e.message, e.stack);
      this.running = false; return;
    }
    this.rafId = requestAnimationFrame(this.loop);
  };

  update(dt) {
    if (this.dead) {
      this.updateExplosions(dt);
      return;
    }

    // Input
    let kx = 0, ky = 0;
    if (this.keys['arrowleft'] || this.keys['a']) kx -= 1;
    if (this.keys['arrowright'] || this.keys['d']) kx += 1;
    if (this.keys['arrowup'] || this.keys['w']) ky -= 1;
    if (this.keys['arrowdown'] || this.keys['s']) ky += 1;
    const ix = this.input.x !== 0 ? this.input.x : kx;
    const iy = this.input.y !== 0 ? this.input.y : ky;
    const boost = this.input.boost || this.keys[' '] || this.keys['shift'];
    const firing = this.input.fire || this.keys['z'] || this.keys['j'];

    // Movement
    const accel = 60;
    this.shipVel.x += ix * accel * dt;
    this.shipVel.y += -iy * accel * dt;
    this.shipVel.x *= 0.92;
    this.shipVel.y *= 0.92;
    this.shipPos.x += this.shipVel.x * dt;
    this.shipPos.y += this.shipVel.y * dt;
    this.shipPos.x = Math.max(-18, Math.min(18, this.shipPos.x));
    this.shipPos.y = Math.max(-14, Math.min(14, this.shipPos.y));

    const baseSpeed = this.shipStats.speed;
    const speed = boost ? baseSpeed * 1.9 : baseSpeed;
    this.distance += speed * dt;

    this.shipRot.roll += (-ix*0.6 - this.shipRot.roll) * 0.1;
    this.shipRot.pitch += (-iy*0.3 - this.shipRot.pitch) * 0.1;
    this.shipRot.yaw += (ix*0.3 - this.shipRot.yaw) * 0.1;
    this.ship.position.set(this.shipPos.x, this.shipPos.y, -3);
    this.ship.rotation.set(this.shipRot.pitch, Math.PI + this.shipRot.yaw, this.shipRot.roll);

    this.engineGlow.scale.setScalar(boost ? 1.6 + Math.sin(performance.now()*0.03)*0.2 : 1.0);
    this.engineGlow.material.color.setHex(boost ? 0x80c0ff : 0xffeb80);

    // Camera
    const ctx = this.shipPos.x * 0.3;
    const cty = this.shipPos.y * 0.3 + 1;
    this.camera.position.x += (ctx - this.camera.position.x) * 0.1;
    this.camera.position.y += (cty - this.camera.position.y) * 0.1;
    this.camera.position.z = 5;
    this.camera.lookAt(this.shipPos.x*0.5, this.shipPos.y*0.5, -10);

    // Firing
    if (firing) {
      const now = performance.now() / 1000;
      if (now - this.lastFire > this.shipStats.fireRate) {
        this.fireLaser();
        this.lastFire = now;
      }
    }

    // World scroll
    const moveDist = speed * dt;
    this.obstacles.forEach((o) => {
      o.position.z += moveDist;
      o.rotation.x += o.userData.spin.x;
      o.rotation.y += o.userData.spin.y;
      o.rotation.z += o.userData.spin.z;
      if (o.position.z > 10) {
        const ang = Math.random()*Math.PI*2; const rad = 8 + Math.random()*18;
        o.position.x = Math.cos(ang)*rad; o.position.y = Math.sin(ang)*rad;
        o.position.z -= 50*25 + Math.random()*200;
      }
    });
    this.rings.forEach(r => { r.position.z += moveDist; r.rotation.z += 0.005; if (r.position.z > 10) r.position.z -= 40*30; });
    this.nebulae.forEach(n => { n.position.z += moveDist*0.3; if (n.position.z > 50) n.position.z -= 14*80 + 200; });
    this.grid.position.z += moveDist; if (this.grid.position.z > -100) this.grid.position.z -= 1000;
    this.gridTop.position.z += moveDist; if (this.gridTop.position.z > -100) this.gridTop.position.z -= 1000;

    // Update enemies
    this.updateEnemies(dt, moveDist);
    // Update lasers
    this.updateLasers(dt, moveDist);
    // Explosions
    this.updateExplosions(dt);

    // HUD
    els.hudDist.textContent = Math.floor(this.distance);
    els.hudKills.textContent = (currentPilot.kills || 0) + this.runKills;

    // Save best distance every 3s
    if (performance.now() - this.lastSave > 3000) {
      this.lastSave = performance.now();
      this.saveBest();
    }
  }

  updateEnemies(dt, moveDist) {
    const t = performance.now() * 0.001;
    for (let i = this.enemies.length - 1; i >= 0; i--) {
      const e = this.enemies[i];
      // Move forward with world + slight strafe
      e.position.z += moveDist * 0.5; // slower than world (approaching)
      e.userData.strafePhase += dt * e.userData.strafeSpeed;
      e.position.x += Math.sin(e.userData.strafePhase) * dt * 4;
      e.position.y += Math.cos(e.userData.strafePhase * 0.7) * dt * 3;
      e.rotation.y += dt * 1.5;
      e.rotation.x += dt * 0.8;

      // Fire at player
      const now = performance.now();
      if (now - e.userData.lastFire > 1800 && e.position.z < -8 && e.position.z > -60) {
        e.userData.lastFire = now;
        this.enemyFireLaser(e);
      }

      // Despawn if behind
      if (e.position.z > 12) {
        this.scene.remove(e); this.enemies.splice(i, 1);
        this.spawnEnemy(-100 - Math.random() * 60);
        continue;
      }

      // Collision with ship
      const dx = e.position.x - this.shipPos.x;
      const dy = e.position.y - this.shipPos.y;
      const dz = e.position.z - (-3);
      if (Math.hypot(dx, dy, dz) < 1.4) {
        this.takeDamage(35);
        this.spawnExplosion(e.position.x, e.position.y, e.position.z, 0xff4040);
        this.scene.remove(e); this.enemies.splice(i, 1);
        this.spawnEnemy(-100 - Math.random() * 60);
      }
    }

    // Maintain enemy count
    while (this.enemies.length < 5) this.spawnEnemy(-100 - Math.random() * 80);
  }

  updateLasers(dt, moveDist) {
    // Player lasers
    for (let i = this.lasers.length - 1; i >= 0; i--) {
      const l = this.lasers[i];
      l.position.z -= l.userData.speed * dt;
      l.userData.life -= dt;
      // Hit enemies
      let hit = false;
      for (let j = this.enemies.length - 1; j >= 0; j--) {
        const e = this.enemies[j];
        const dx = e.position.x - l.position.x;
        const dy = e.position.y - l.position.y;
        const dz = e.position.z - l.position.z;
        if (Math.hypot(dx, dy, dz) < 1.2) {
          e.userData.hp -= this.shipStats.damage;
          this.scene.remove(l); this.lasers.splice(i, 1);
          hit = true;
          if (e.userData.hp <= 0) {
            this.spawnExplosion(e.position.x, e.position.y, e.position.z, 0xff4040);
            this.scene.remove(e); this.enemies.splice(j, 1);
            this.runKills++;
            this.runCredits += 25;
            this.spawnEnemy(-100 - Math.random() * 60);
          }
          break;
        }
      }
      if (!hit && (l.userData.life <= 0 || l.position.z < -120)) {
        this.scene.remove(l); this.lasers.splice(i, 1);
      }
    }

    // Enemy lasers
    for (let i = this.enemyLasers.length - 1; i >= 0; i--) {
      const l = this.enemyLasers[i];
      l.position.x += l.userData.vx * dt;
      l.position.y += l.userData.vy * dt;
      l.position.z += l.userData.vz * dt;
      l.userData.life -= dt;
      // Hit player
      const dx = l.position.x - this.shipPos.x;
      const dy = l.position.y - this.shipPos.y;
      const dz = l.position.z - (-3);
      if (Math.hypot(dx, dy, dz) < 1.0) {
        this.takeDamage(12);
        this.spawnExplosion(l.position.x, l.position.y, l.position.z, 0xffeb80);
        this.scene.remove(l); this.enemyLasers.splice(i, 1);
        continue;
      }
      if (l.userData.life <= 0 || l.position.z > 20 || l.position.z < -120) {
        this.scene.remove(l); this.enemyLasers.splice(i, 1);
      }
    }
  }

  updateExplosions(dt) {
    for (let i = this.explosions.length - 1; i >= 0; i--) {
      const p = this.explosions[i];
      p.position.x += p.userData.vx * dt;
      p.position.y += p.userData.vy * dt;
      p.position.z += p.userData.vz * dt;
      p.userData.life -= dt;
      p.material.opacity = Math.max(0, p.userData.life);
      p.scale.multiplyScalar(0.96);
      if (p.userData.life <= 0) {
        this.scene.remove(p); this.explosions.splice(i, 1);
      }
    }
  }

  async saveBest() {
    if (!currentPilot || this.distance <= (currentPilot.best_distance || 0)) return;
    try {
      currentPilot.best_distance = this.distance;
      await supabase.from(PILOTS_TABLE).update({ best_distance: this.distance }).eq('id', currentPilot.id);
    } catch (e) { console.error('Save error:', e.message); }
  }
}

// Boot
(async () => {
  try {
    const { data: { session } } = await supabase.auth.getSession();
    els.loading.classList.add('hidden');
    if (session && session.user) {
      currentUser = session.user;
      await loadPilot();
      await checkInvites();
      showGame();
    } else { showAuth(); }
  } catch (e) {
    console.error('Boot error:', e.message);
    els.loading.classList.add('hidden'); showAuth();
  }
})();
</script>
