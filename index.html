<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shader Pilot</title>
<style>
  html,body{height:100%;margin:0;background:#05010f;color:#ffeb80;font-family:monospace;display:grid;place-items:center} .msg{text-align:center;letter-spacing:2px}
</style>
</head>
<body>
<div class="msg">INITIALIZING SHADER PILOT...</div>
<script>
(async () => {
  try {
    const source = 'https://raw.githubusercontent.com/joseb33w/shader-pilot/fdf6bc4/index.html';
    let html = await fetch(source, { cache: 'no-store' }).then(r => {
      if (!r.ok) throw new Error('Unable to load game shell');
      return r.text();
    });

    const oldResume = `function resumeGameAfterOverlay() {
  if (!game) return;
  if (anyOverlayOpen()) return;
  clearGameInputs();
  // Reset timing so we don't get a giant dt jump after being paused
  game.last = performance.now();
  game.paused = false;
  els.pauseBtn.classList.remove('active');
}`;
    const newResume = `let overlayResumeTimer = null;
function forceResumeGameFromOverlay() {
  if (!game || anyOverlayOpen()) return;
  clearGameInputs();
  // Reset timing so we don't get a giant dt jump after a menu/section closes.
  game.last = performance.now();
  game.paused = false;
  els.pauseBtn.classList.remove('active');
  // In some mobile WebViews RAF can stall after closing fixed overlays.
  // Cancel the pending frame and queue a clean one so the run always resumes.
  if (game.running && !game.dead) {
    try { cancelAnimationFrame(game.raf); } catch (_) {}
    game.raf = requestAnimationFrame(game.loop);
  }
}
function resumeGameAfterOverlay() {
  if (!game) return;
  if (overlayResumeTimer) clearTimeout(overlayResumeTimer);
  const resume = () => {
    if (anyOverlayOpen()) return;
    forceResumeGameFromOverlay();
  };
  requestAnimationFrame(resume);
  // Fallback for Safari/iOS cases where the first frame after an overlay close is dropped.
  overlayResumeTimer = setTimeout(resume, 140);
}`;
    html = html.replace(oldResume, newResume);

    html = html.replace(
      `this.distance = 0; this.runKills = 0; this.runCredits = 0; this.runPoints = 0; this.lastFire = 0; this.spawnTimer = 0; this.saveTimer = 0; this.dead = false; this.running = false; this.paused = false;`,
      `this.distance = 0; this.runKills = 0; this.runCredits = 0; this.runPoints = 0; this.lastFire = 0; this.spawnTimer = 0; this.saveTimer = 0; this.dead = false; this.running = false; this.paused = false; this.frameWatch = null; this.lastFrameSeen = performance.now();`
    );

    html = html.replace(
      `start() { this.running = true; this.paused = false; this.last = performance.now(); for (let i=0;i<6;i++) this.spawnEnemy(this.w + i*160); this.loop(); }
  stop() { this.running = false; cancelAnimationFrame(this.raf); }`,
      `start() {
    this.running = true;
    this.paused = false;
    this.last = performance.now();
    this.lastFrameSeen = performance.now();
    for (let i=0;i<6;i++) this.spawnEnemy(this.w + i*160);
    this.loop();
    clearInterval(this.frameWatch);
    this.frameWatch = setInterval(() => {
      if (!this.running || document.hidden || !els.game.classList.contains('active') || anyOverlayOpen() || this.dead) return;
      if (this.paused || performance.now() - this.lastFrameSeen > 900) {
        forceResumeGameFromOverlay();
      }
    }, 500);
  }
  stop() {
    this.running = false;
    clearInterval(this.frameWatch);
    cancelAnimationFrame(this.raf);
  }`
    );

    html = html.replace(
      `const now = performance.now();
      let dt = Math.min(.05, (now - this.last) / 1000);`,
      `const now = performance.now();
      this.lastFrameSeen = now;
      let dt = Math.min(.05, (now - this.last) / 1000);`
    );

    html = html.replace(
      `} else { this.last = performance.now(); }
    });`,
      `} else {
        this.last = performance.now();
        if (this.running && !this.dead && !anyOverlayOpen()) forceResumeGameFromOverlay();
      }
    });`
    );

    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    document.body.innerHTML = '<div class="msg">LOAD FAILED<br><small>' + String(err.message || err).replace(/[<>&]/g, '') + '</small></div>';
  }
})();
</script>
</body>
</html>
