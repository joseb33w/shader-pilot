function pilotStorageKey() {

function persistPilotLocal() {

      kills: currentPilot.kills,

      best_distance: currentPilot.best_distance,
      runs_completed: currentPilot.runs_completed,

    console.warn('Local pilot save failed:', err.message || err);
  }
}
function mergePilotLocal() {
  if (!currentPilot) return;
  try {
    const raw = localStorage.getItem(pilotStorageKey());
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== 'object') return;
    if (typeof saved.credits === 'number') currentPilot.credits = saved.credits;
    if (typeof saved.kills === 'number') currentPilot.kills = Math.max(currentPilot.kills || 0, saved.kills);
    if (typeof saved.best_score === 'number') currentPilot.best_score = Math.max(currentPilot.best_score || 0, saved.best_score);
    if (typeof saved.best_distance === 'number') currentPilot.best_distance = Math.max(currentPilot.best_distance || 0, saved.best_distance);
    if (typeof saved.runs_completed === 'number') currentPilot.runs_completed = Math.max(currentPilot.runs_completed || 0, saved.runs_completed);
    if (Array.isArray(saved.owned_ships)) currentPilot.owned_ships = Array.from(new Set([...(currentPilot.owned_ships || ['striker']), ...saved.owned_ships]));
    if (saved.active_ship && SHIPS[saved.active_ship]) currentPilot.active_ship = saved.active_ship;
    if (saved.upgrades?.weapons) {
      const dbWeapons = weaponState();
      const savedWeapons = saved.upgrades.weapons;
      currentPilot.upgrades = currentPilot.upgrades || {};
      currentPilot.upgrades.weapons = {
        owned: Array.from(new Set(['pulse', ...(dbWeapons.owned || []), ...(savedWeapons.owned || [])])).filter(k => WEAPONS[k]),
        active: WEAPONS[savedWeapons.active] ? savedWeapons.active : dbWeapons.active,
        levels: { ...(dbWeapons.levels || {}), ...(savedWeapons.levels || {}) }

async function equipWeaponKey(key, opts = {}) {
  if (!currentPilot || !WEAPONS[key]) return { ok:false };

  const currentWS = weaponState();
  const owned = currentWS.owned.includes(key);
  const price = opts.price ?? weapon.price ?? 0;
  if (opts.buy && !owned && (currentPilot.credits || 0) < price) {
    showToast('NEED CREDITS');
    return { ok:false };
  }
  const nextUpgrades = JSON.parse(JSON.stringify(currentPilot.upgrades || {}));
  nextUpgrades.weapons = {

  if (!currentPilot) return { ok: false, error: 'no pilot' };

  const previous = {};

  Object.assign(currentPilot, patch);
  if (!currentPilot.id) return { ok: true, local: true };

  const tryOnce = async () => {
    const { data, error } = await withTimeout(
      supabase.from(PILOTS_TABLE).update(patch).eq('id', currentPilot.id).select().single(),
      8000, 'Pilot save'
    );
    if (error) throw error;
    return data;
  };

  let lastErr = null;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const data = await tryOnce();
      if (data) Object.assign(currentPilot, data);
      return { ok: true };
    } catch (err) {
      lastErr = err;
      const msg = (err && (err.message || err.toString())) || '';
      // PGRST204 = schema cache hasn't refreshed yet after a column add. Wait and retry.
      const isSchemaCache = /schema cache|PGRST204|Could not find the/i.test(msg);
      if (!isSchemaCache) break;
      await new Promise(r => setTimeout(r, 1200 * (attempt + 1)));
    }

  // Roll back local state
  for (const k of Object.keys(previous)) currentPilot[k] = previous[k];
  console.error('Pilot save error:', lastErr?.message || lastErr);
  showToast('SAVE FAILED');
  return { ok: false, error: lastErr?.message || String(lastErr) };
}`, `// Local-first save: weapon purchases/equips must never freeze or vanish because
